services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=${STACK}_app"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--log.level=${TRAEFIK_LOG_LEVEL}"
      - "--accesslog=true"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - app
    deploy:
      replicas: ${TRAEFIK_REPLICAS}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "start:web"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${WEB_REPLICAS}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.deeptg.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.deeptg.entrypoints=websecure"
        - "traefik.http.routers.deeptg.tls=true"
        - "traefik.http.routers.deeptg.tls.certresolver=le"
        - "traefik.http.routers.deeptg.service=deeptg"
        - "traefik.http.services.deeptg.loadbalancer.server.port=3000"
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  worker:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "worker"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${WORKER_REPLICAS}
      restart_policy:
        condition: on-failure

networks:
  app:
    driver: overlay

volumes:
  postgres_data:
  redis_data:
  traefik_letsencrypt:
