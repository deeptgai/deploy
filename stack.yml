version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "start:web"]
    env_file:
      - ENV
    ports:
      - target: 3000
        published: ${APP_PORT}
        protocol: tcp
        mode: ingress
    networks:
      - app
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${WEB_REPLICAS}
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  worker:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "worker"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${WORKER_REPLICAS}
      restart_policy:
        condition: on-failure

networks:
  app:
    driver: overlay

volumes:
  postgres_data:
  redis_data:
