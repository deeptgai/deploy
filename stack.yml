services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    command:
      - "--entrypoints.${TRAEFIK_WEB_ENTRYPOINT}.address=:${TRAEFIK_HTTP_PORT}"
      - "--providers.swarm.endpoint=${TRAEFIK_SWARM_ENDPOINT}"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=${TRAEFIK_NETWORK}"
      - "--log.level=${TRAEFIK_LOG_LEVEL}"
      - "--accesslog=${TRAEFIK_ACCESSLOG}"
    ports:
      - target: ${TRAEFIK_HTTP_PORT}
        published: ${TRAEFIK_HTTP_PUBLISHED_PORT}
        protocol: tcp
        mode: host
    volumes:
      - ${TRAEFIK_DOCKER_SOCKET}:${TRAEFIK_DOCKER_SOCKET}:ro
    networks:
      - app
    deploy:
      replicas: ${TRAEFIK_REPLICAS}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE}
    command:
      - server
      - -s3
      - -dir=/data
      - -ip=${SEAWEEDFS_IP}
      - -ip.bind=0.0.0.0
      - -master.port=${SEAWEEDFS_MASTER_PORT}
      - -volume.port=${SEAWEEDFS_VOLUME_PORT}
      - -filer.port=${SEAWEEDFS_FILER_PORT}
      - -s3.port=${SEAWEEDFS_S3_PORT}
    volumes:
      - seaweedfs_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${SEAWEEDFS_S3_PORT}/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "start:web"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
      - seaweedfs
    deploy:
      replicas: ${WEB_REPLICAS}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=${TRAEFIK_WEB_ENTRYPOINT}"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.service=${TRAEFIK_SERVICE_NAME}"
        - "traefik.http.services.${TRAEFIK_SERVICE_NAME}.loadbalancer.server.port=${WEB_INTERNAL_PORT}"
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  bot:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "start:tgbot"]
    env_file:
      - ENV
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.TELEGRAM_WEBHOOK_PORT || '8787') + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app
    depends_on:
      - postgres
    deploy:
      replicas: ${BOT_REPLICAS}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${TRAEFIK_BOT_ROUTER_NAME}.rule=Host(`${BOT_DOMAIN}`)"
        - "traefik.http.routers.${TRAEFIK_BOT_ROUTER_NAME}.entrypoints=${TRAEFIK_WEB_ENTRYPOINT}"
        - "traefik.http.routers.${TRAEFIK_BOT_ROUTER_NAME}.service=${TRAEFIK_BOT_SERVICE_NAME}"
        - "traefik.http.routers.${TRAEFIK_BOT_WEBHOOK_ROUTER_NAME}.rule=Host(`${DOMAIN}`) && PathPrefix(`${TELEGRAM_WEBHOOK_PATH}`)"
        - "traefik.http.routers.${TRAEFIK_BOT_WEBHOOK_ROUTER_NAME}.entrypoints=${TRAEFIK_WEB_ENTRYPOINT}"
        - "traefik.http.routers.${TRAEFIK_BOT_WEBHOOK_ROUTER_NAME}.service=${TRAEFIK_BOT_SERVICE_NAME}"
        - "traefik.http.services.${TRAEFIK_BOT_SERVICE_NAME}.loadbalancer.server.port=${TELEGRAM_WEBHOOK_PORT}"
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  worker:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "worker"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
      - seaweedfs
    deploy:
      replicas: ${WORKER_REPLICAS}
      restart_policy:
        condition: on-failure

networks:
  app:
    driver: overlay
    attachable: true
    name: ${TRAEFIK_NETWORK}

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME}
  redis_data:
    name: ${REDIS_VOLUME}
  seaweedfs_data:
    name: ${SEAWEEDFS_VOLUME}
