services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    command:
      - "--entrypoints.${TRAEFIK_WEB_ENTRYPOINT}.address=:${TRAEFIK_HTTP_PORT}"
      - "--providers.swarm.endpoint=${TRAEFIK_SWARM_ENDPOINT}"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=${TRAEFIK_NETWORK}"
      - "--log.level=${TRAEFIK_LOG_LEVEL}"
      - "--accesslog=${TRAEFIK_ACCESSLOG}"
    ports:
      - target: ${TRAEFIK_HTTP_PORT}
        published: ${TRAEFIK_HTTP_PUBLISHED_PORT}
        protocol: tcp
        mode: host
    volumes:
      - ${TRAEFIK_DOCKER_SOCKET}:${TRAEFIK_DOCKER_SOCKET}:ro
    networks:
      - app
    deploy:
      replicas: ${TRAEFIK_REPLICAS}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "start:web"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${WEB_REPLICAS}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=${TRAEFIK_WEB_ENTRYPOINT}"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.service=${TRAEFIK_SERVICE_NAME}"
        - "traefik.http.services.${TRAEFIK_SERVICE_NAME}.loadbalancer.server.port=${WEB_INTERNAL_PORT}"
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  worker:
    image: ${IMAGE}:${IMAGE_TAG}
    command: ["npm", "run", "worker"]
    env_file:
      - ENV
    networks:
      - app
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${WORKER_REPLICAS}
      restart_policy:
        condition: on-failure

networks:
  app:
    driver: overlay
    attachable: true
    name: ${TRAEFIK_NETWORK}

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME}
  redis_data:
    name: ${REDIS_VOLUME}
